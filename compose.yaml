services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    environment:
      - SPARK_DRIVER_MEMORY=4g
    mem_limit: 6g
    deploy:
      resources:
        limits:
          memory: 6g
    volumes:
      - .:/app
    working_dir: /app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
